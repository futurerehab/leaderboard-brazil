<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Leaderboard</title>

</head>
<body>
    <h1>Leaderboard de Jogadores</h1>

            </thead>
            <tbody></tbody>

            <thead>
                <tr><th>Nome</th><th>Pontuação</th></tr>

</html>
