<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FastBuilder BR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#0b0b0b,#1a0000);
color:white;
}

header{
text-align:center;
padding:35px;
font-size:36px;
font-family:Orbitron;
letter-spacing:2px;
background:linear-gradient(90deg,#3b0000,#8b0000);
}

nav{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
padding:20px;
}

button{
background:#8b0000;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
font-family:Inter;
}

button:hover{
background:#c40000;
transform:scale(1.05);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.hero{
text-align:center;
padding:40px;
}

.hero h1{
font-family:Orbitron;
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:.9;
}

.start{
margin-top:20px;
font-size:18px;
padding:12px 25px;
}

.top3{
display:flex;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
flex:1;
text-align:center;
padding:20px;
border-radius:12px;
font-weight:bold;
font-size:20px;
font-family:Rajdhani;
}

.gold{background:linear-gradient(135deg,#6e0000,#b30000)}
.silver{background:linear-gradient(135deg,#2a2a2a,#555)}
.bronze{background:linear-gradient(135deg,#3a1a1a,#7a2e2e)}

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

th{
background:#8b0000;
padding:12px;
}

td{
padding:11px;
border-bottom:1px solid #222;
}

td:nth-child(2){
font-family:Rajdhani;
font-size:18px;
letter-spacing:1px;
}

tr:hover{
background:#1a0000;
}

</style>

</head>

<body>

<header>FASTBUILDER BR</header>

<nav>

<button onclick="home()">Home</button>
<button onclick="show('extra')">Extrashort</button>
<button onclick="show('short')">Short</button>
<button onclick="show('normal')">Normal</button>
<button onclick="show('long')">Long</button>
<button onclick="show('inclined')">Inclined</button>
<button onclick="show('inclinedshort')">Inclined Short</button>
<button onclick="show('onestack')">Onestack</button>

</nav>

<div class="container" id="content"></div>

<script>

const data={

extra:[
["zDeletex",1.95],
["RoidEs",2.0],
["Nickzadas",2.0],
["RJ",2.0],
["jogadinhas",2.0],
["Vzku",2.05]
],

short:[
["RJ",3.75],
["zDeletex",3.75],
["Thirty",3.8],
["RoidEs",3.8],
["Vzku",3.8]
],

normal:[
["RJ",7.25],
["zDeletex",7.25],
["Rooides",7.3],
["Vzku",7.3],
["Thirty",7.3]
],

long:[
["RJ",12.1],
["zDeletex",12.15],
["Junin",12.2],
["izprite",12.2],
["Vzku",12.25]
],

inclined:[
["Thirty",6.6],
["guqa",7.25],
["Bzuki",7.55],
["jogadinhas",7.7],
["Limaaas",8.0]
],

inclinedshort:[
["RJ",2.95],
["Nickzadas",2.95],
["bielxyz1",3.15],
["Thirty",3.25],
["Vzku",3.3]
],

onestack:[
["Thirty",11.4],
["Opku",11.6],
["XuyeWhatsApp",11.8],
["Nesix",11.8],
["jogadinhas",11.8]
]

}

function home(){

document.getElementById("content").innerHTML=`

<div class="hero">

<h1>FastBuilder Leaderboard</h1>

<p>
Ranking da comunidade brasileira de FastBuilder.
</p>

<p>
Aqui você encontra os melhores tempos nas principais
categorias do bridge competitivo.
</p>

<button class="start" onclick="show('extra')">Ver Leaderboards</button>

</div>

`

}

function show(cat){

let players=data[cat]

let html=`<div class="top3">

<div class="card gold">🥇 ${players[0][0]}<br>${players[0][1].toFixed(1)}s</div>
<div class="card silver">🥈 ${players[1][0]}<br>${players[1][1].toFixed(1)}s</div>
<div class="card bronze">🥉 ${players[2][0]}<br>${players[2][1].toFixed(1)}s</div>

</div>`

html+=`<table>

<tr>
<th>#</th>
<th>Player</th>
<th>Tempo</th>
</tr>`

players.forEach((p,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${p[0]}</td>
<td>${p[1].toFixed(1)}s</td>
</tr>
`

})

html+=`</table>`

document.getElementById("content").innerHTML=html

}

home()

</script>

</body>
</html>
